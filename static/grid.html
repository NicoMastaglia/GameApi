<!doctype html>
<html lang="en">
    <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS v5.2.1 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    </head>

    <body style="height: 100vh;">
        <header>

            <!-- place navbar here 
             
            -->
        </header>
        <main class="h-75 d-flex">
            <div class="container-lg h-100">
                <div class="panel row h-100">
                    <div class="h-100 alert alert-light col-md-3 col-12">
                        lobby
                    </div>
                       <div id="gioco" class="h-100 alert alert-light col-md-6 col-12 bg-dark-subtle">
                        gioco
                    </div>
                       <div id="chat" class="h-50 alert alert-light col-md-3 col-12">
                        <template id="templateMessaggio" >
                                <div class="card" >
                                
                                <div class="card-body">
                                    <h5 id="mittente" class="card-title">mittente</h5>
                                    <p id="testo" class="card-text">testo</p>
                                    <a href="#" class="btn btn-primary">Go somewhere</a>
                                </div>
                                </div>
                        </template>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Libraries -->
        <script
            src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"
        ></script>
       
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
            integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
            crossorigin="anonymous"
        ></script>

        <script language="javascript">
            const chat=document.getElementById("chat");
            function inserisci(mittente,testo){
                const templateMessaggio=document.getElementById("templateMessaggio");
                const messaggio=templateMessaggio.content.cloneNode(true);
                messaggio.querySelectorAll("#testo")[0].innerText=testo;
                messaggio.querySelectorAll("#mittente")[0].innerText=mittente;
                chat.appendChild(messaggio);

            }
            inserisci("Marco","Ciao come stai? hai visto questo template????");
            inserisci("Pippo","BENE!!!!!!? hai visto questo template????");
            function inserisciMessaggio(testo,dove){
                const messaggio=document.createElement("p");
                messaggio.innerText=testo;
                messaggio.classList.add("rounded");
                messaggio.classList.add("bg-primary");
                messaggio.classList.add("opacity-50");
                dove.appendChild(messaggio);
            }


            
            const gioco=document.getElementById("gioco");
            console.log(chat);
            if (chat!==null){
                inserisciMessaggio("ola",chat);
                
                //chat.innerHTML+="<p class='bg-primary'>ciao</p><p class='bg-primary opacity-50'>ola</p>";
            }
            if (gioco!==null){
                inserisciMessaggio("ciao",gioco);
            }

        </script>
    </body>
</html>
